<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simba Zengeni Portfolio | Hero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --accent-cyan: #38BDF8;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
            --glass-border: rgba(51, 65, 85, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Particle Background */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Hero Container */
        .hero-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle at center, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
        }

        /* Minimalist AI Avatar */
        .avatar-box {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px var(--accent-cyan));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Glass Card Content */
        .content-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 1rem;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 1rem 0;
            letter-spacing: -1px;
            font-weight: 700;
        }

        .typing-container {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
            font-size: 1.2rem;
            min-height: 1.5em;
            margin-bottom: 1.5rem;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .cta-button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 1rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button:hover {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="hero-container">
        <div class="avatar-box">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="35" r="15" stroke="#38BDF8" stroke-width="2"/>
                <path d="M25 80C25 65 35 55 50 55C65 55 75 65 75 80" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"/>
                <circle cx="50" cy="55" r="3" fill="#38BDF8"/>
                <circle cx="25" cy="80" r="2" fill="#38BDF8"/>
                <circle cx="75" cy="80" r="2" fill="#38BDF8"/>
                <line x1="50" y1="55" x2="25" y2="80" stroke="#38BDF8" stroke-width="0.5" stroke-dasharray="2 2"/>
                <line x1="50" y1="55" x2="75" y2="80" stroke="#38BDF8" stroke-width="0.5" stroke-dasharray="2 2"/>
            </svg>
        </div>

        <div class="content-card">
            <h1>Simba Zengeni</h1>
            <div class="typing-container" id="typewriter"></div>
            <p>Advancing artificial intelligence through rigorous research and 
               inclusive engineering. Specialized in Digital Transformation and 
               Accessible Computing Models.</p>
            <button class="cta-button">EXPLORE RESEARCH _</button>
        </div>
    </div>

    <script>
        // --- Typewriter Effect ---
        const text = "PhD Researcher // AI Specialist // Software Architect";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        // --- Particle Background ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(148, 163, 184, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function handleParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        initCanvas();
        handleParticles();
        animate();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
